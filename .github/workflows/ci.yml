name: ci
on:
  push:
    branches: [main]
  pull_request:
jobs:
  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - uses: actions/setup-go@v5
        with: { go-version-file: go.mod }
      - run: make lint-api
      - run: make gen-check
      - run: make generate && git diff --exit-code
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: cd web/admin && npm ci && npm test && npm run build
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version-file: go.mod }
      # Audio fixture tests generate sines with ffmpeg (they skip when absent;
      # CI must not skip them).
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg
      - run: make check
