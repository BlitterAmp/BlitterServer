name: Sync Docker Hub overview

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update Docker Hub overview
        env:
          DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
        run: bash scripts/sync-dockerhub-overview.sh README.md
