name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      requested_by:
        description: "Repository requesting a release check"
        required: false
      requested_tag:
        description: "Counterpart release that requested this check"
        required: false

permissions:
  contents: read

concurrency:
  group: blitterserver-release
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      sha: ${{ steps.release.outputs.sha }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ secrets.GH_ACTIONS_PR_TOKEN }}
          target-branch: main

  publish:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.sha }}
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with: { go-version-file: go.mod }
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - name: Verify release source
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}
          SHA: ${{ needs.release-please.outputs.sha }}
        run: |
          test "$(git rev-parse HEAD)" = "$SHA"
          test "v$(cat version.txt)" = "$TAG"
          test "$(git rev-list -n 1 "$TAG")" = "$SHA"
      - name: Build embedded admin console
        run: make web
      - name: Verify server
        run: make check
      - name: Package release
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: bash scripts/package-release.sh "$TAG"
      - name: Upload and publish release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          gh release upload "$TAG" dist/release/* --repo "$GITHUB_REPOSITORY"
          gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --draft=false

  request-desktop-release:
    needs: [release-please, publish]
    if: needs.publish.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Sync released engine into BlitterAmp
        env:
          GH_TOKEN: ${{ secrets.GH_ACTIONS_PR_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
          SHA: ${{ needs.release-please.outputs.sha }}
        run: gh workflow run sync-engine.yml --repo BlitterAmp/BlitterAmp --ref main -f tag="$TAG" -f sha="$SHA"
