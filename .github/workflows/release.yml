name: Release

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [blitteramp-released]
  workflow_dispatch:
    inputs:
      requested_by:
        description: "Repository requesting a release check"
        required: false
      requested_tag:
        description: "Counterpart release that requested this check"
        required: false

permissions:
  contents: read

concurrency:
  group: blitterserver-release
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      sha: ${{ steps.release.outputs.sha }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ secrets.GH_ACTIONS_PR_TOKEN }}
          target-branch: main

  publish:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.sha }}
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with: { go-version-file: go.mod }
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - name: Verify release source
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}
          SHA: ${{ needs.release-please.outputs.sha }}
          APPROVED_MAJOR_RELEASE: ${{ vars.APPROVED_MAJOR_RELEASE }}
        run: |
          test "$(git rev-parse HEAD)" = "$SHA"
          test "v$(cat version.txt)" = "$TAG"
          test "$(git rev-list -n 1 "$TAG")" = "$SHA"
          major="${TAG#v}"
          major="${major%%.*}"
          if [ "$major" -gt 1 ]; then
            test "$APPROVED_MAJOR_RELEASE" = "$TAG" || {
              echo "Refusing unapproved major release $TAG; set APPROVED_MAJOR_RELEASE only after explicit user approval." >&2
              exit 1
            }
          fi
      - name: Build embedded admin console
        run: make web
      - name: Verify server
        run: make check
      - name: Package release
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: bash scripts/package-release.sh "$TAG"
      - name: Prepare image metadata
        id: image
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          echo "created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: matjam
          password: ${{ secrets.DOCKER_TOKEN }}
      - name: Build and publish Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            matjam/blitterserver:${{ steps.image.outputs.version }}
            matjam/blitterserver:latest
          build-args: |
            VERSION=${{ steps.image.outputs.version }}
            REVISION=${{ needs.release-please.outputs.sha }}
            CREATED=${{ steps.image.outputs.created }}
      - name: Update Docker Hub overview
        env:
          DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
        run: bash scripts/sync-dockerhub-overview.sh README.md
      - name: Upload and publish release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          gh release upload "$TAG" dist/release/* --repo "$GITHUB_REPOSITORY"
          gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --draft=false

  request-desktop-release:
    needs: [release-please, publish]
    if: needs.publish.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Sync released engine into BlitterAmp
        env:
          GH_TOKEN: ${{ secrets.GH_ACTIONS_PR_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
          SHA: ${{ needs.release-please.outputs.sha }}
        run: |
          gh api --method POST repos/BlitterAmp/BlitterAmp/dispatches \
            -f event_type=blitterserver-released \
            -f "client_payload[tag]=$TAG" \
            -f "client_payload[sha]=$SHA"
