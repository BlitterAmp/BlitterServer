openapi: 3.0.3
info:
  title: Blittarr API
  version: 1.0.0-draft.1
  license:
    name: MIT
    url: https://opensource.org/license/mit
  description: |
    The BlitterAmp middleman service. Apps (BlitterAmp iOS/desktop) talk only to
    this API; Blittarr owns the music source (Plex in v1), server-side
    transcoding, acquisition (Lidarr), last.fm, and cross-device taste/follow
    state.

    **Auth realms:** device endpoints use a bearer token minted via PIN pairing;
    `/admin/api/*` uses an admin cookie session. The WebSocket event channel is
    documented in `docs/architecture.md` (envelope + event catalog).

    **Conventions:** JSON everywhere; opaque string ids; list endpoints paginate
    with `offset`/`limit` and return `total`; errors are a Problem object.
servers:
  - url: http://{host}:{port}
    variables:
      host: { default: "127.0.0.1" }
      port: { default: "8484" }

tags:
  - name: system
  - name: pairing
  - name: library
  - name: search
  - name: discovery
  - name: playback
  - name: streaming
  - name: artifacts
  - name: follows
  - name: events
  - name: admin

security:
  - deviceToken: []

paths:
  # ───────────────────────────── system ─────────────────────────────
  /v1/ping:
    get:
      tags: [system]
      summary: Unauthenticated liveness + identity (pairing discovery)
      security: []
      responses:
        "200":
          description: Server identity
          content:
            application/json:
              schema:
                type: object
                required: [name, version]
                properties:
                  name: { type: string, example: Blittarr }
                  version: { type: string, example: 1.0.0 }
                  setupComplete: { type: boolean }

  /v1/status:
    get:
      tags: [system]
      summary: Server + integration status
      responses:
        "200":
          description: Status
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ServerStatus" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/capabilities:
    get:
      tags: [system]
      summary: Feature flags the apps use to gate UI
      responses:
        "200":
          description: Capabilities
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Capabilities" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/me:
    get:
      tags: [system]
      summary: The calling device's identity
      responses:
        "200":
          description: Device
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Device" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  # ───────────────────────────── pairing ─────────────────────────────
  /v1/pair:
    post:
      tags: [pairing]
      summary: Begin PIN pairing
      description: |
        Returns a short-lived human-readable code the user approves in the web
        admin. The app then polls `GET /v1/pair/{pairingId}`.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [deviceName, deviceType]
              properties:
                deviceName: { type: string, example: "Nathan's iPhone" }
                deviceType: { type: string, enum: [ios, desktop, web, other] }
                appVersion: { type: string }
      responses:
        "201":
          description: Pairing started
          content:
            application/json:
              schema:
                type: object
                required: [pairingId, code, expiresAt]
                properties:
                  pairingId: { type: string }
                  code: { type: string, example: "7GK4PC", description: Show to the user; entered/approved in web admin }
                  expiresAt: { type: string, format: date-time }
        "429": { $ref: "#/components/responses/Problem" }

  /v1/pair/{pairingId}:
    get:
      tags: [pairing]
      summary: Poll pairing state
      security: []
      parameters:
        - { name: pairingId, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Pairing state
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status: { type: string, enum: [pending, approved, denied, expired] }
                  token: { type: string, nullable: true, description: "Present once, when status=approved" }
                  deviceId: { type: string, nullable: true }
        "404": { $ref: "#/components/responses/NotFound" }

  # ───────────────────────────── library ─────────────────────────────
  /v1/library:
    get:
      tags: [library]
      summary: Active library summary (freshness anchor)
      responses:
        "200":
          description: Library
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Library" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "503": { $ref: "#/components/responses/SourceUnavailable" }

  /v1/artists:
    get:
      tags: [library]
      summary: List artists (paged)
      parameters:
        - $ref: "#/components/parameters/offset"
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/sort"
      responses:
        "200":
          description: Artists
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/Artist" }
        "503": { $ref: "#/components/responses/SourceUnavailable" }

  /v1/artists/{artistId}:
    get:
      tags: [library]
      summary: Artist detail (includes genres, stats, last.fm bio when available)
      parameters: [{ name: artistId, in: path, required: true, schema: { type: string } }]
      responses:
        "200":
          description: Artist
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ArtistDetail" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/artists/{artistId}/albums:
    get:
      tags: [library]
      summary: Artist's albums (owned; for owned+external discography see /v1/external/artists)
      parameters: [{ name: artistId, in: path, required: true, schema: { type: string } }]
      responses:
        "200":
          description: Albums
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Album" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/artists/{artistId}/tracks:
    get:
      tags: [library]
      summary: All tracks by an artist
      parameters: [{ name: artistId, in: path, required: true, schema: { type: string } }]
      responses:
        "200":
          description: Tracks
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Track" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/artists/{artistId}/similar:
    get:
      tags: [discovery]
      summary: Similar artists (owned resolved to library entries; unowned flagged external)
      parameters: [{ name: artistId, in: path, required: true, schema: { type: string } }]
      responses:
        "200":
          description: Similar artists
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/SimilarArtist" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/albums:
    get:
      tags: [library]
      summary: List albums (paged)
      parameters:
        - $ref: "#/components/parameters/offset"
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/sort"
      responses:
        "200":
          description: Albums
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/Album" }
        "503": { $ref: "#/components/responses/SourceUnavailable" }

  /v1/albums/{albumId}:
    get:
      tags: [library]
      summary: Album detail
      parameters: [{ name: albumId, in: path, required: true, schema: { type: string } }]
      responses:
        "200":
          description: Album
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Album" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/albums/{albumId}/tracks:
    get:
      tags: [library]
      summary: Album tracks
      parameters: [{ name: albumId, in: path, required: true, schema: { type: string } }]
      responses:
        "200":
          description: Tracks
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Track" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/tracks:
    get:
      tags: [library]
      summary: Flat track list (paged)
      parameters:
        - $ref: "#/components/parameters/offset"
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/sort"
      responses:
        "200":
          description: Tracks
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/Track" }
        "503": { $ref: "#/components/responses/SourceUnavailable" }

  /v1/tracks/{trackId}:
    get:
      tags: [library]
      summary: Track detail
      parameters: [{ name: trackId, in: path, required: true, schema: { type: string } }]
      responses:
        "200":
          description: Track
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Track" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/genres:
    get:
      tags: [library]
      summary: Genre index
      responses:
        "200":
          description: Genres
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Genre" }

  /v1/genres/{genre}/tracks:
    get:
      tags: [library]
      summary: Tracks for a genre (server-composed)
      parameters: [{ name: genre, in: path, required: true, schema: { type: string } }]
      responses:
        "200":
          description: Tracks
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Track" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/playlists:
    get:
      tags: [library]
      summary: List playlists
      responses:
        "200":
          description: Playlists
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Playlist" }
    post:
      tags: [library]
      summary: Create playlist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title: { type: string }
                trackIds:
                  type: array
                  items: { type: string }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Playlist" }

  /v1/playlists/{playlistId}:
    get:
      tags: [library]
      summary: Playlist detail
      parameters: [{ name: playlistId, in: path, required: true, schema: { type: string } }]
      responses:
        "200":
          description: Playlist
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Playlist" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [library]
      summary: Rename playlist
      parameters: [{ name: playlistId, in: path, required: true, schema: { type: string } }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title: { type: string }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Playlist" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [library]
      summary: Delete playlist
      parameters: [{ name: playlistId, in: path, required: true, schema: { type: string } }]
      responses:
        "204": { description: Deleted }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/playlists/{playlistId}/tracks:
    get:
      tags: [library]
      summary: Playlist tracks (paged for very long playlists)
      parameters:
        - { name: playlistId, in: path, required: true, schema: { type: string } }
        - $ref: "#/components/parameters/offset"
        - $ref: "#/components/parameters/limit"
      responses:
        "200":
          description: Tracks
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/PlaylistTrack" }
        "404": { $ref: "#/components/responses/NotFound" }
    post:
      tags: [library]
      summary: Append tracks
      parameters: [{ name: playlistId, in: path, required: true, schema: { type: string } }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [trackIds]
              properties:
                trackIds:
                  type: array
                  items: { type: string }
      responses:
        "204": { description: Appended }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/playlists/{playlistId}/tracks/{itemId}:
    delete:
      tags: [library]
      summary: Remove one playlist item (by playlist item id, not track id)
      parameters:
        - { name: playlistId, in: path, required: true, schema: { type: string } }
        - { name: itemId, in: path, required: true, schema: { type: string } }
      responses:
        "204": { description: Removed }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/ratings:
    put:
      tags: [library]
      summary: Rate an item (track or artist), source-backed
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [itemType, itemId]
              properties:
                itemType: { type: string, enum: [track, artist] }
                itemId: { type: string }
                rating10:
                  type: integer
                  minimum: 0
                  maximum: 10
                  nullable: true
                  description: Source scale 0–10 (stars×2); null clears
      responses:
        "204": { description: Rated }
        "404": { $ref: "#/components/responses/NotFound" }

  # ───────────────────────────── search ─────────────────────────────
  /v1/search:
    get:
      tags: [search]
      summary: Federated search — library results plus external (not-in-library) artists
      parameters:
        - { name: q, in: query, required: true, schema: { type: string, minLength: 2 } }
        - { name: types, in: query, required: false, schema: { type: string, example: "artists,albums,tracks,external" }, description: Comma-separated filter; default all }
      responses:
        "200":
          description: Grouped results
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SearchResults" }

  # ───────────────────────────── discovery ─────────────────────────────
  /v1/home:
    get:
      tags: [discovery]
      summary: Server-composed home rails
      responses:
        "200":
          description: Rails
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HomeRails" }

  /v1/mixes:
    get:
      tags: [discovery]
      summary: Available mixes (smart playlists, for-you, mood mixes)
      responses:
        "200":
          description: Mixes
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Mix" }

  /v1/mixes/{mixId}/tracks:
    get:
      tags: [discovery]
      summary: Materialize a mix
      parameters: [{ name: mixId, in: path, required: true, schema: { type: string } }]
      responses:
        "200":
          description: Tracks
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Track" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/radio/next:
    post:
      tags: [discovery]
      summary: Next batch of radio tracks for the given seeds
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                seedTrackIds:
                  type: array
                  items: { type: string }
                seedArtistIds:
                  type: array
                  items: { type: string }
                excludeTrackIds:
                  type: array
                  items: { type: string }
                  description: Recently played/queued — server also applies its own exclusions
                count: { type: integer, default: 10, maximum: 50 }
      responses:
        "200":
          description: Playable owned tracks
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Track" }

  /v1/external/artists/{name}:
    get:
      tags: [discovery]
      summary: External artist page (bio, owned∪external discography, similar)
      parameters: [{ name: name, in: path, required: true, schema: { type: string } }]
      responses:
        "200":
          description: External artist
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ExternalArtist" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ───────────────────────────── playback ─────────────────────────────
  /v1/playback/events:
    post:
      tags: [playback]
      summary: Report playback events (batched; feeds taste, scrobbles, recently-played)
      description: |
        Apps queue events offline and flush in order. Idempotency: events carry a
        client-generated `eventId`; duplicates are ignored.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [events]
              properties:
                events:
                  type: array
                  maxItems: 500
                  items: { $ref: "#/components/schemas/PlaybackEvent" }
      responses:
        "202": { description: Accepted }

  /v1/taste/snapshot:
    get:
      tags: [playback]
      summary: Taste profile snapshot (per-item stats for UI badges/panels)
      responses:
        "200":
          description: Snapshot
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TasteSnapshot" }

  # ───────────────────────────── streaming ─────────────────────────────
  /v1/stream/{trackId}:
    get:
      tags: [streaming]
      summary: Stream the original file (direct play, Range supported)
      parameters:
        - { name: trackId, in: path, required: true, schema: { type: string } }
        - { name: Range, in: header, required: false, schema: { type: string } }
      responses:
        "200": { description: Full content, content: { audio/*: { schema: { type: string, format: binary } } } }
        "206": { description: Partial content }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/stream-grants:
    post:
      tags: [streaming]
      summary: Mint a short-lived signed URL for players that cannot send headers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [trackId]
              properties:
                trackId: { type: string }
      responses:
        "201":
          description: Grant
          content:
            application/json:
              schema:
                type: object
                required: [url, expiresAt]
                properties:
                  url: { type: string, description: "Absolute URL, valid for the grant lifetime only" }
                  expiresAt: { type: string, format: date-time }

  /v1/art/{artId}:
    get:
      tags: [streaming]
      summary: Artwork with server-side resize + cache
      parameters:
        - { name: artId, in: path, required: true, schema: { type: string } }
        - { name: w, in: query, required: false, schema: { type: integer, maximum: 2048 } }
        - { name: h, in: query, required: false, schema: { type: integer, maximum: 2048 } }
      responses:
        "200": { description: Image, content: { image/jpeg: { schema: { type: string, format: binary } } } }
        "404": { $ref: "#/components/responses/NotFound" }

  # ───────────────────────────── artifacts ─────────────────────────────
  /v1/artifacts:
    post:
      tags: [artifacts]
      summary: Request download artifacts (server transcodes + caches; batch-friendly)
      description: |
        Idempotent per (trackId, format, bitrateKbps): re-requesting returns the
        existing artifact. `format: original` artifacts are immediately `ready`.
        Progress and readiness arrive via WS `artifact.updated`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [trackIds, format]
              properties:
                trackIds:
                  type: array
                  minItems: 1
                  maxItems: 500
                  items: { type: string }
                format: { type: string, enum: [original, aac] }
                bitrateKbps: { type: integer, enum: [128, 192, 256, 320], nullable: true, description: Required for aac }
      responses:
        "202":
          description: Artifacts (existing or queued)
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Artifact" }

  /v1/artifacts/{artifactId}:
    get:
      tags: [artifacts]
      summary: Artifact status
      parameters: [{ name: artifactId, in: path, required: true, schema: { type: string } }]
      responses:
        "200":
          description: Artifact
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Artifact" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [artifacts]
      summary: Hint that this device no longer needs the artifact (server may evict)
      parameters: [{ name: artifactId, in: path, required: true, schema: { type: string } }]
      responses:
        "204": { description: Released }

  /v1/artifacts/{artifactId}/file:
    get:
      tags: [artifacts]
      summary: Download the artifact (exact Content-Length; Range supported)
      parameters:
        - { name: artifactId, in: path, required: true, schema: { type: string } }
        - { name: Range, in: header, required: false, schema: { type: string } }
      responses:
        "200": { description: Full content, content: { audio/*: { schema: { type: string, format: binary } } } }
        "206": { description: Partial content }
        "409": { description: Not ready yet, content: { application/problem+json: { schema: { $ref: "#/components/schemas/Problem" } } } }
        "404": { $ref: "#/components/responses/NotFound" }

  # ───────────────────────────── follows ─────────────────────────────
  /v1/follows:
    get:
      tags: [follows]
      summary: List follows
      responses:
        "200":
          description: Follows
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/FollowRecord" }
    put:
      tags: [follows]
      summary: Follow (idempotent). Artist follow triggers acquisition + new-release watching server-side.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [kind, name]
              properties:
                kind: { type: string, enum: [artist, album, track] }
                name: { type: string, description: Artist name (or album/track title) }
                itemId: { type: string, nullable: true, description: Library id when owned }
                artistName: { type: string, nullable: true, description: For album/track follows }
      responses:
        "200":
          description: Follow record (existing or created)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FollowRecord" }

  /v1/follows/{followId}:
    delete:
      tags: [follows]
      summary: Unfollow (stops new-release watching; keeps acquired media)
      parameters: [{ name: followId, in: path, required: true, schema: { type: string } }]
      responses:
        "204": { description: Unfollowed }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/acquisition/activity:
    get:
      tags: [follows]
      summary: Acquisition activity (desktop Activity view; empty when no acquirer configured)
      responses:
        "200":
          description: Activity
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AcquisitionActivity" }

  # ───────────────────────────── events ─────────────────────────────
  /v1/ws:
    get:
      tags: [events]
      summary: WebSocket upgrade — typed event stream
      description: |
        Standard WS upgrade authenticated with the device bearer token.
        Envelope `{type, at, data}`; event catalog in docs/architecture.md.
        Clients MUST ignore unknown event types.
      responses:
        "101": { description: Switching protocols }
        "401": { $ref: "#/components/responses/Unauthorized" }

  # ───────────────────────────── admin ─────────────────────────────
  /admin/api/setup:
    post:
      tags: [admin]
      summary: First-run — set the admin password (only while setupComplete=false)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password: { type: string, minLength: 10 }
      responses:
        "204": { description: Admin created }
        "409": { description: Setup already complete, content: { application/problem+json: { schema: { $ref: "#/components/schemas/Problem" } } } }

  /admin/api/session:
    post:
      tags: [admin]
      summary: Admin login (sets session cookie)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password: { type: string }
      responses:
        "204": { description: Session cookie set }
        "401": { $ref: "#/components/responses/Unauthorized" }
    delete:
      tags: [admin]
      summary: Admin logout
      security: [{ adminSession: [] }]
      responses:
        "204": { description: Logged out }

  /admin/api/state:
    get:
      tags: [admin]
      summary: Admin dashboard state (setup progress, integrations, source health)
      security: [{ adminSession: [] }]
      responses:
        "200":
          description: State
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminState" }

  /admin/api/source/plex/pin:
    post:
      tags: [admin]
      summary: Start Plex account link (PIN flow)
      security: [{ adminSession: [] }]
      responses:
        "201":
          description: PIN
          content:
            application/json:
              schema:
                type: object
                required: [pinId, code, url]
                properties:
                  pinId: { type: string }
                  code: { type: string }
                  url: { type: string, description: plex.tv/link }

  /admin/api/source/plex/pin/{pinId}:
    get:
      tags: [admin]
      summary: Poll Plex PIN
      security: [{ adminSession: [] }]
      parameters: [{ name: pinId, in: path, required: true, schema: { type: string } }]
      responses:
        "200":
          description: PIN state
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status: { type: string, enum: [pending, linked, expired] }

  /admin/api/source/plex/libraries:
    get:
      tags: [admin]
      summary: Discoverable music libraries across linked servers
      security: [{ adminSession: [] }]
      responses:
        "200":
          description: Libraries
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/SourceLibrary" }

  /admin/api/source/plex/library:
    put:
      tags: [admin]
      summary: Select the active library
      security: [{ adminSession: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [serverId, libraryId]
              properties:
                serverId: { type: string }
                libraryId: { type: string }
      responses:
        "204": { description: Selected }

  /admin/api/integrations/lidarr:
    get:
      tags: [admin]
      summary: Lidarr config (secrets reported as set-flags only)
      security: [{ adminSession: [] }]
      responses:
        "200":
          description: Config
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LidarrConfig" }
    put:
      tags: [admin]
      summary: Set Lidarr config
      security: [{ adminSession: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [baseUrl, apiKey]
              properties:
                baseUrl: { type: string, example: "http://192.168.1.5:8686" }
                apiKey: { type: string }
                allowSelfSigned: { type: boolean, default: false }
      responses:
        "204": { description: Saved }
    delete:
      tags: [admin]
      summary: Remove Lidarr integration
      security: [{ adminSession: [] }]
      responses:
        "204": { description: Removed }

  /admin/api/integrations/lidarr/test:
    post:
      tags: [admin]
      summary: Test Lidarr connectivity
      security: [{ adminSession: [] }]
      responses:
        "200":
          description: Result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/IntegrationTestResult" }

  /admin/api/integrations/lastfm:
    get:
      tags: [admin]
      summary: last.fm config + connection state
      security: [{ adminSession: [] }]
      responses:
        "200":
          description: Config
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LastfmConfig" }
    put:
      tags: [admin]
      summary: Set last.fm API credentials
      security: [{ adminSession: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [apiKey, sharedSecret]
              properties:
                apiKey: { type: string }
                sharedSecret: { type: string }
      responses:
        "204": { description: Saved }
    delete:
      tags: [admin]
      summary: Disconnect last.fm
      security: [{ adminSession: [] }]
      responses:
        "204": { description: Removed }

  /admin/api/integrations/lastfm/connect:
    post:
      tags: [admin]
      summary: Start last.fm user auth (returns URL to open; completes via callback)
      security: [{ adminSession: [] }]
      responses:
        "201":
          description: Auth URL
          content:
            application/json:
              schema:
                type: object
                required: [url]
                properties:
                  url: { type: string }

  /admin/api/pairings:
    get:
      tags: [admin]
      summary: Pending pairing requests
      security: [{ adminSession: [] }]
      responses:
        "200":
          description: Pending pairings
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/PairingRequest" }

  /admin/api/pairings/{pairingId}/approve:
    post:
      tags: [admin]
      summary: Approve a pairing
      security: [{ adminSession: [] }]
      parameters: [{ name: pairingId, in: path, required: true, schema: { type: string } }]
      responses:
        "204": { description: Approved }
        "404": { $ref: "#/components/responses/NotFound" }

  /admin/api/pairings/{pairingId}/deny:
    post:
      tags: [admin]
      summary: Deny a pairing
      security: [{ adminSession: [] }]
      parameters: [{ name: pairingId, in: path, required: true, schema: { type: string } }]
      responses:
        "204": { description: Denied }
        "404": { $ref: "#/components/responses/NotFound" }

  /admin/api/devices:
    get:
      tags: [admin]
      summary: Paired devices
      security: [{ adminSession: [] }]
      responses:
        "200":
          description: Devices
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Device" }

  /admin/api/devices/{deviceId}:
    delete:
      tags: [admin]
      summary: Revoke a device (its token stops working immediately)
      security: [{ adminSession: [] }]
      parameters: [{ name: deviceId, in: path, required: true, schema: { type: string } }]
      responses:
        "204": { description: Revoked }
        "404": { $ref: "#/components/responses/NotFound" }

  /admin/api/settings/transcode:
    get:
      tags: [admin]
      summary: Transcode + artifact-cache settings
      security: [{ adminSession: [] }]
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TranscodeSettings" }
    put:
      tags: [admin]
      summary: Update transcode + artifact-cache settings
      security: [{ adminSession: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TranscodeSettings" }
      responses:
        "204": { description: Saved }

components:
  securitySchemes:
    deviceToken:
      type: http
      scheme: bearer
      description: Per-device token minted via PIN pairing
    adminSession:
      type: apiKey
      in: cookie
      name: blittarr_admin

  parameters:
    offset:
      name: offset
      in: query
      schema: { type: integer, minimum: 0, default: 0 }
    limit:
      name: limit
      in: query
      schema: { type: integer, minimum: 1, maximum: 1000, default: 200 }
    sort:
      name: sort
      in: query
      schema: { type: string, enum: [title, artist, recentlyAdded, year], default: title }

  responses:
    Unauthorized:
      description: Missing/invalid credentials
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
    NotFound:
      description: Not found
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
    Problem:
      description: Error
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
    SourceUnavailable:
      description: Music source unreachable (apps show offline/degraded state)
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }

  schemas:
    Problem:
      type: object
      required: [title, status]
      properties:
        title: { type: string }
        status: { type: integer }
        detail: { type: string, nullable: true }
        code: { type: string, nullable: true, description: "Machine-readable, e.g. source_unavailable, artifact_not_ready" }

    Page:
      type: object
      required: [offset, limit, total]
      properties:
        offset: { type: integer }
        limit: { type: integer }
        total: { type: integer }

    ServerStatus:
      type: object
      required: [version, setupComplete, source]
      properties:
        version: { type: string }
        setupComplete: { type: boolean }
        source:
          type: object
          required: [kind, connected]
          properties:
            kind: { type: string, enum: [plex] }
            connected: { type: boolean }
            libraryName: { type: string, nullable: true }
        integrations:
          type: object
          properties:
            lidarr: { type: string, enum: [absent, configured, error] }
            lastfm: { type: string, enum: [absent, configured, connected, error] }

    Capabilities:
      type: object
      required: [acquisition, lastfm, transcodeFormats]
      properties:
        acquisition: { type: boolean, description: Follow(artist) will acquire; Activity view available }
        lastfm: { type: boolean }
        transcodeFormats:
          type: array
          items: { type: string, enum: [original, aac] }
          description: aac absent when ffmpeg unavailable
        radio: { type: boolean }

    Device:
      type: object
      required: [deviceId, name, type, pairedAt]
      properties:
        deviceId: { type: string }
        name: { type: string }
        type: { type: string, enum: [ios, desktop, web, other] }
        pairedAt: { type: string, format: date-time }
        lastSeenAt: { type: string, format: date-time, nullable: true }

    PairingRequest:
      type: object
      required: [pairingId, code, deviceName, deviceType, requestedAt, expiresAt]
      properties:
        pairingId: { type: string }
        code: { type: string }
        deviceName: { type: string }
        deviceType: { type: string }
        requestedAt: { type: string, format: date-time }
        expiresAt: { type: string, format: date-time }

    Library:
      type: object
      required: [libraryId, title, updatedAt, counts]
      properties:
        libraryId: { type: string }
        title: { type: string }
        updatedAt:
          type: integer
          format: int64
          description: Freshness anchor (max of source updatedAt/scannedAt); changes when the source rescans
        counts:
          type: object
          properties:
            artists: { type: integer }
            albums: { type: integer }
            tracks: { type: integer }

    Artist:
      type: object
      required: [artistId, name]
      properties:
        artistId: { type: string }
        name: { type: string }
        artId: { type: string, nullable: true }
        genres:
          type: array
          items: { type: string }
        albumCount: { type: integer, nullable: true }
        userRating10: { type: integer, nullable: true }

    ArtistDetail:
      allOf:
        - $ref: "#/components/schemas/Artist"
        - type: object
          properties:
            bio: { type: string, nullable: true, description: "HTML-stripped, from last.fm when available" }
            trackCount: { type: integer, nullable: true }
            followed: { type: boolean }
            stats:
              type: object
              nullable: true
              properties:
                plays: { type: integer }
                lastPlayedAt: { type: string, format: date-time, nullable: true }

    Album:
      type: object
      required: [albumId, title, artistId, artistName]
      properties:
        albumId: { type: string }
        title: { type: string }
        artistId: { type: string }
        artistName: { type: string }
        year: { type: integer, nullable: true }
        artId: { type: string, nullable: true }
        genres:
          type: array
          items: { type: string }
        moods:
          type: array
          items: { type: string }
        trackCount: { type: integer, nullable: true }
        updatedAt: { type: integer, format: int64, nullable: true, description: For client cache validators }

    Track:
      type: object
      required: [trackId, title, artistId, artistName, albumId, albumTitle, durationMs, media]
      properties:
        trackId: { type: string }
        title: { type: string }
        index: { type: integer, nullable: true }
        discNumber: { type: integer, nullable: true }
        artistId: { type: string }
        artistName: { type: string }
        albumId: { type: string }
        albumTitle: { type: string }
        durationMs: { type: integer }
        artId: { type: string, nullable: true }
        userRating10: { type: integer, nullable: true }
        genres:
          type: array
          items: { type: string }
        media: { $ref: "#/components/schemas/MediaInfo" }

    MediaInfo:
      type: object
      required: [container, audioCodec]
      properties:
        container: { type: string, example: flac }
        audioCodec: { type: string, example: flac }
        bitrateKbps: { type: integer, nullable: true }
        sizeBytes: { type: integer, format: int64, nullable: true }

    Genre:
      type: object
      required: [name, albumCount]
      properties:
        name: { type: string }
        albumCount: { type: integer }
        artId: { type: string, nullable: true, description: Representative art for collage }

    Playlist:
      type: object
      required: [playlistId, title, trackCount]
      properties:
        playlistId: { type: string }
        title: { type: string }
        trackCount: { type: integer }
        durationMs: { type: integer, nullable: true }
        artId: { type: string, nullable: true }
        smart: { type: boolean, default: false, description: Source-defined smart playlist (read-only) }
        updatedAt: { type: integer, format: int64, nullable: true }

    PlaylistTrack:
      allOf:
        - $ref: "#/components/schemas/Track"
        - type: object
          required: [itemId]
          properties:
            itemId: { type: string, description: Playlist item id (removal handle) }

    SimilarArtist:
      type: object
      required: [name, owned]
      properties:
        name: { type: string }
        owned: { type: boolean }
        artistId: { type: string, nullable: true, description: Set when owned }
        artId: { type: string, nullable: true }
        match: { type: number, nullable: true, minimum: 0, maximum: 1 }
        followed: { type: boolean }

    SearchResults:
      type: object
      required: [artists, albums, tracks, external]
      properties:
        artists:
          type: array
          items: { $ref: "#/components/schemas/Artist" }
        albums:
          type: array
          items: { $ref: "#/components/schemas/Album" }
        tracks:
          type: array
          items: { $ref: "#/components/schemas/Track" }
        external:
          type: array
          description: Not-in-library artists (empty when no acquisition/discovery integration)
          items: { $ref: "#/components/schemas/SimilarArtist" }

    HomeRails:
      type: object
      required: [rails]
      properties:
        rails:
          type: array
          items:
            type: object
            required: [kind, title]
            properties:
              kind: { type: string, enum: [mixes, playlists, recentlyPlayed, recentlyAdded, newDiscoveries] }
              title: { type: string }
              mixes:
                type: array
                nullable: true
                items: { $ref: "#/components/schemas/Mix" }
              playlists:
                type: array
                nullable: true
                items: { $ref: "#/components/schemas/Playlist" }
              tracks:
                type: array
                nullable: true
                items: { $ref: "#/components/schemas/Track" }
              albums:
                type: array
                nullable: true
                items: { $ref: "#/components/schemas/Album" }

    Mix:
      type: object
      required: [mixId, kind, title]
      properties:
        mixId: { type: string, example: "mood:driving" }
        kind: { type: string, enum: [forYou, topRated, heavyRotation, rediscover, mood, genre] }
        title: { type: string }
        collageArtIds:
          type: array
          maxItems: 4
          items: { type: string }
        trackCount: { type: integer, nullable: true }

    ExternalArtist:
      type: object
      required: [name, owned]
      properties:
        name: { type: string }
        owned: { type: boolean }
        artistId: { type: string, nullable: true }
        bio: { type: string, nullable: true }
        artId: { type: string, nullable: true }
        followed: { type: boolean }
        similar:
          type: array
          items: { $ref: "#/components/schemas/SimilarArtist" }
        discography:
          type: array
          items:
            type: object
            required: [title, state]
            properties:
              title: { type: string }
              year: { type: integer, nullable: true }
              state: { type: string, enum: [owned, available, acquiring, unavailable] }
              albumId: { type: string, nullable: true, description: Set when owned }

    PlaybackEvent:
      type: object
      required: [eventId, type, trackId, at]
      properties:
        eventId: { type: string, description: Client-generated UUID (dedupe key) }
        type: { type: string, enum: [started, progress, paused, resumed, ended, skipped] }
        trackId: { type: string }
        positionSec: { type: number, nullable: true }
        at: { type: string, format: date-time }

    TasteSnapshot:
      type: object
      required: [artists, tracks]
      properties:
        computedAt: { type: string, format: date-time }
        artists:
          type: array
          items:
            type: object
            required: [name, affinity]
            properties:
              name: { type: string }
              affinity: { type: number }
        tracks:
          type: array
          items:
            type: object
            required: [key, plays]
            properties:
              key: { type: string, description: "lower(artist)␟lower(title)" }
              plays: { type: integer }
              skips: { type: integer }
              lastPlayedAt: { type: string, format: date-time, nullable: true }

    Artifact:
      type: object
      required: [artifactId, trackId, format, status]
      properties:
        artifactId: { type: string }
        trackId: { type: string }
        format: { type: string, enum: [original, aac] }
        bitrateKbps: { type: integer, nullable: true }
        status: { type: string, enum: [queued, processing, ready, failed] }
        bytes: { type: integer, format: int64, nullable: true, description: Exact size once ready }
        error: { type: string, nullable: true }

    FollowRecord:
      type: object
      required: [followId, kind, name, followedAt, state]
      properties:
        followId: { type: string }
        kind: { type: string, enum: [artist, album, track] }
        name: { type: string }
        artistName: { type: string, nullable: true }
        itemId: { type: string, nullable: true }
        followedAt: { type: string, format: date-time }
        state:
          type: string
          enum: [local, watching, acquiring, error]
          description: local = favorite only (no acquirer / album / track); watching = Lidarr monitoring; acquiring = back-catalog search in flight
        error: { type: string, nullable: true }

    AcquisitionActivity:
      type: object
      required: [queue, wanted]
      properties:
        queue:
          type: array
          items:
            type: object
            required: [title, artistName, progress]
            properties:
              title: { type: string }
              artistName: { type: string }
              progress: { type: number, minimum: 0, maximum: 1 }
        wanted:
          type: array
          items:
            type: object
            required: [title, artistName]
            properties:
              title: { type: string }
              artistName: { type: string }

    SourceLibrary:
      type: object
      required: [serverId, serverName, libraryId, title, owned]
      properties:
        serverId: { type: string }
        serverName: { type: string }
        libraryId: { type: string }
        title: { type: string }
        owned: { type: boolean }
        sourceTitle: { type: string, nullable: true, description: Owner name for shared servers }

    AdminState:
      type: object
      required: [setupComplete, source, integrations, pendingPairings, deviceCount]
      properties:
        setupComplete: { type: boolean }
        source:
          type: object
          properties:
            linked: { type: boolean }
            librarySelected: { type: boolean }
            connected: { type: boolean }
            libraryName: { type: string, nullable: true }
        integrations:
          type: object
          properties:
            lidarr: { type: string, enum: [absent, configured, error] }
            lastfm: { type: string, enum: [absent, configured, connected, error] }
        pendingPairings: { type: integer }
        deviceCount: { type: integer }

    LidarrConfig:
      type: object
      required: [configured]
      properties:
        configured: { type: boolean }
        baseUrl: { type: string, nullable: true }
        apiKeySet: { type: boolean }
        allowSelfSigned: { type: boolean }

    LastfmConfig:
      type: object
      required: [configured, connected]
      properties:
        configured: { type: boolean, description: API credentials present }
        connected: { type: boolean, description: User session established }
        username: { type: string, nullable: true }

    IntegrationTestResult:
      type: object
      required: [ok]
      properties:
        ok: { type: boolean }
        version: { type: string, nullable: true }
        error: { type: string, nullable: true }

    TranscodeSettings:
      type: object
      required: [defaultFormat, defaultBitrateKbps, artifactCacheMaxBytes]
      properties:
        defaultFormat: { type: string, enum: [original, aac] }
        defaultBitrateKbps: { type: integer, enum: [128, 192, 256, 320] }
        artifactCacheMaxBytes: { type: integer, format: int64 }
        ffmpegAvailable: { type: boolean, readOnly: true }
