openapi: 3.0.3
info:
  title: Blittarr API
  version: 1.0.0-draft.1
  license:
    name: MIT
    url: https://opensource.org/license/mit
  description: |
    The BlitterAmp middleman service. Apps (BlitterAmp iOS/desktop) talk only to
    this API; Blittarr owns the music source (Plex in v1), server-side
    transcoding, acquisition (Lidarr), last.fm, and cross-device taste/love
    state.

    **Auth realms:** device endpoints use bearer tokens; `/admin/api/*` uses an
    admin cookie session. The WebSocket event channel is documented in
    `docs/architecture.md` (envelope + event catalog).

    **Users are household profiles** (Netflix-style, passwordless, optional
    PIN; created by the admin in the web admin UI). PIN pairing mints a
    **device token** whose only powers are listing profiles and exchanging for
    **profile tokens** (`POST /v1/profile-tokens`). Everything else requires a
    profile token and is implicitly scoped to that profile: playlists,
    ratings, taste, loves, play history, home rails, last.fm connection.
    Shared across profiles: the library, the artifact cache, and acquisition
    (new-release watching is the union of everyone's artist loves).
    Profile switching in-app = using a different cached profile token; no
    admin involvement after the one-time device pairing approval.

    **Conventions:** JSON everywhere; list endpoints paginate
    with `cursor`/`limit` and return `{items, nextCursor}`; errors are a Problem object.

    **Ids** are opaque strings carrying a type prefix — `art_` artist, `alb_`
    album, `trk_` track, `pl_` playlist, `pli_` playlist item, `prf_` profile,
    `dev_` device, `pair_` pairing, `arf_` artifact, `img_` artwork, `lib_`
    library, `lov_` love, `rec_` recommendation, `pty_` party, `pqi_` party
    queue item. The prefix is for logs and error messages; clients MUST NOT
    parse ids beyond treating them as opaque. Exceptions: `mixId` is a
    computed slug (`mood:driving`), playback `eventId` is a client-generated
    UUID, and `/admin/api/source/plex/*` exposes source-native ids.
servers:
  - url: http://{host}:{port}
    variables:
      host: { default: "127.0.0.1" }
      port: { default: "8484" }

tags:
  - { name: system, description: "Liveness, status, capabilities, identity" }
  - { name: pairing, description: Device pairing (QR claim and short-code approval) }
  - { name: profiles, description: "Household profiles, profile tokens, per-profile last.fm" }
  - { name: library, description: "Canonical library index — artists, albums, tracks, genres, playlists, ratings" }
  - { name: search, description: Federated library + external search }
  - { name: discovery, description: "Home rails, mixes, radio, similar/external artists, engine recommendations" }
  - { name: playback, description: Playback event ingestion and taste snapshot }
  - { name: streaming, description: "Direct-play streaming, stream grants, artwork" }
  - { name: artifacts, description: Pre-transcoded download artifacts }
  - { name: loves, description: Love / Not-for-me tri-state and acquisition activity }
  - { name: events, description: Server-push event stream }
  - { name: admin, description: Admin web UI API (cookie session realm) }

security:
  - deviceToken: []

paths:
  # ───────────────────────────── system ─────────────────────────────
  /v1/ping:
    get:
      operationId: getPing
      tags: [system]
      summary: Unauthenticated liveness + identity (pairing discovery)
      security: []
      responses:
        "200":
          description: Server identity
          content:
            application/json:
              schema:
                type: object
                required: [name, version]
                properties:
                  name: { type: string, example: Blittarr }
                  version: { type: string, example: 1.0.0 }
                  setupComplete: { type: boolean }

  /v1/status:
    get:
      operationId: getStatus
      tags: [system]
      summary: Server + integration status
      responses:
        "200":
          description: Status
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ServerStatus" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/capabilities:
    get:
      operationId: getCapabilities
      tags: [system]
      summary: Feature flags the apps use to gate UI
      responses:
        "200":
          description: Capabilities
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Capabilities" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/me:
    get:
      operationId: getMe
      tags: [system]
      summary: The calling token's identity (device + profile when profile-scoped)
      responses:
        "200":
          description: Identity
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Me" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  # ───────────────────────────── pairing ─────────────────────────────
  /v1/pair:
    post:
      operationId: startPairing
      tags: [pairing]
      summary: Begin PIN pairing
      description: |
        Returns a short-lived human-readable code the user approves in the web
        admin. The app then polls `GET /v1/pair/{pairingId}`.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [deviceName, deviceType]
              properties:
                deviceName: { type: string, example: "Nathan's iPhone" }
                deviceType: { type: string, enum: [ios, desktop, web, other] }
                appVersion: { type: string }
      responses:
        "201":
          description: Pairing started
          content:
            application/json:
              schema:
                type: object
                required: [pairingId, code, expiresAt]
                properties:
                  pairingId: { type: string }
                  code: { type: string, example: "7GK4PC", description: Show to the user; entered/approved in web admin }
                  expiresAt: { type: string, format: date-time }
        "429": { $ref: "#/components/responses/Problem" }

  /v1/pair/{pairingId}:
    get:
      operationId: getPairing
      tags: [pairing]
      summary: Poll pairing state
      security: []
      parameters:
        - { name: pairingId, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Pairing state
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status: { type: string, enum: [pending, approved, denied, expired] }
                  token: { type: string, nullable: true, description: "DEVICE token, present once when status=approved — exchange it for a profile token via /v1/profile-tokens" }
                  deviceId: { type: string, nullable: true }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/pair/claim:
    post:
      operationId: claimPairCode
      tags: [pairing]
      summary: Claim a QR pairing code (one scan = discovery + auth)
      description: |
        The QR shown in the web admin encodes the server's canonical URL plus a
        short-lived (≤15 min) single-use code. Claiming mints a **device
        token** immediately — no admin approval step (showing the QR was the
        approval). The app then lists profiles and mints profile tokens as
        usual.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code, deviceName, deviceType]
              properties:
                code: { type: string, example: "7GK4PC" }
                deviceName: { type: string, example: "Nathan's iPhone" }
                deviceType: { type: string, enum: [ios, desktop, web, other] }
                appVersion: { type: string }
      responses:
        "201":
          description: Device paired
          content:
            application/json:
              schema:
                type: object
                required: [token, deviceId]
                properties:
                  token: { type: string, description: Device token — exchange via /v1/profile-tokens }
                  deviceId: { type: string, example: dev_8f2k1q }
        "404": { $ref: "#/components/responses/NotFound" }
        "410": { description: Code expired or already used, content: { application/problem+json: { schema: { $ref: "#/components/schemas/Problem" } } } }

  # ───────────────────────────── profiles ─────────────────────────────
  /v1/profiles:
    get:
      operationId: listProfiles
      tags: [profiles]
      summary: Household profiles (for the in-app profile switcher)
      description: Accepts device OR profile tokens. Profiles are created by the admin in the web admin UI.
      responses:
        "200":
          description: Profiles
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Profile" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/profile-tokens:
    post:
      operationId: createProfileToken
      tags: [profiles]
      summary: Exchange into a profile (mints a profile-scoped bearer token)
      description: |
        Accepts device OR profile tokens (switching does not require going back
        through the device token). `pin` required only when the target profile
        has one. Apps cache one token per profile; switching profiles = using a
        different cached token, so queued offline requests keep the attribution
        of the profile they were made under.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [profileId]
              properties:
                profileId: { type: string }
                pin: { type: string, nullable: true }
      responses:
        "201":
          description: Profile token
          content:
            application/json:
              schema:
                type: object
                required: [token, profile]
                properties:
                  token: { type: string }
                  profile: { $ref: "#/components/schemas/Profile" }
        "403": { description: PIN required or wrong, content: { application/problem+json: { schema: { $ref: "#/components/schemas/Problem" } } } }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/me/lastfm:
    get:
      operationId: getMyLastfm
      tags: [profiles]
      summary: Calling profile's last.fm connection state
      responses:
        "200":
          description: State
          content:
            application/json:
              schema:
                type: object
                required: [available, connected]
                properties:
                  available: { type: boolean, description: Instance has last.fm API credentials (admin-configured) }
                  connected: { type: boolean }
                  username: { type: string, nullable: true }
        "401": { $ref: "#/components/responses/Unauthorized" }
    delete:
      operationId: disconnectMyLastfm
      tags: [profiles]
      summary: Disconnect the calling profile's last.fm
      responses:
        "204": { description: Disconnected }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/me/lastfm/connect:
    post:
      operationId: connectMyLastfm
      tags: [profiles]
      summary: Start last.fm auth for the calling profile (open the returned URL; completes via callback)
      responses:
        "201":
          description: Auth URL
          content:
            application/json:
              schema:
                type: object
                required: [url]
                properties:
                  url: { type: string }
        "409": { description: Instance has no last.fm API credentials, content: { application/problem+json: { schema: { $ref: "#/components/schemas/Problem" } } } }

  # ───────────────────────────── library ─────────────────────────────
  /v1/library:
    get:
      operationId: getLibrary
      tags: [library]
      summary: Active library summary (freshness anchor)
      responses:
        "200":
          description: Library
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Library" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "503": { $ref: "#/components/responses/SourceUnavailable" }

  /v1/artists:
    get:
      operationId: listArtists
      tags: [library]
      summary: List artists (paged)
      parameters:
        - $ref: "#/components/parameters/cursor"
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/sort"
      responses:
        "200":
          description: Artists
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/Artist" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "503": { $ref: "#/components/responses/SourceUnavailable" }

  /v1/artists/{artistId}:
    get:
      operationId: getArtist
      tags: [library]
      summary: Artist detail (includes genres, stats, last.fm bio when available)
      parameters: [{ name: artistId, in: path, required: true, schema: { type: string } }]
      responses:
        "200":
          description: Artist
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ArtistDetail" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/artists/{artistId}/albums:
    get:
      operationId: listArtistAlbums
      tags: [library]
      summary: Artist's albums (owned; for owned+external discography see /v1/external/artists)
      parameters: [{ name: artistId, in: path, required: true, schema: { type: string } }]
      responses:
        "200":
          description: Albums
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Album" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/artists/{artistId}/tracks:
    get:
      operationId: listArtistTracks
      tags: [library]
      summary: All tracks by an artist
      parameters: [{ name: artistId, in: path, required: true, schema: { type: string } }]
      responses:
        "200":
          description: Tracks
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Track" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/artists/{artistId}/similar:
    get:
      operationId: listSimilarArtists
      tags: [discovery]
      summary: Similar artists (owned resolved to library entries; unowned flagged external)
      parameters: [{ name: artistId, in: path, required: true, schema: { type: string } }]
      responses:
        "200":
          description: Similar artists
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/SimilarArtist" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/albums:
    get:
      operationId: listAlbums
      tags: [library]
      summary: List albums (paged)
      parameters:
        - $ref: "#/components/parameters/cursor"
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/sort"
      responses:
        "200":
          description: Albums
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/Album" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "503": { $ref: "#/components/responses/SourceUnavailable" }

  /v1/albums/{albumId}:
    get:
      operationId: getAlbum
      tags: [library]
      summary: Album detail
      parameters: [{ name: albumId, in: path, required: true, schema: { type: string } }]
      responses:
        "200":
          description: Album
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Album" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/albums/{albumId}/tracks:
    get:
      operationId: listAlbumTracks
      tags: [library]
      summary: Album tracks
      parameters: [{ name: albumId, in: path, required: true, schema: { type: string } }]
      responses:
        "200":
          description: Tracks
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Track" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/tracks:
    get:
      operationId: listTracks
      tags: [library]
      summary: Flat track list (paged)
      parameters:
        - $ref: "#/components/parameters/cursor"
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/sort"
      responses:
        "200":
          description: Tracks
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/Track" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "503": { $ref: "#/components/responses/SourceUnavailable" }

  /v1/tracks/{trackId}:
    get:
      operationId: getTrack
      tags: [library]
      summary: Track detail
      parameters: [{ name: trackId, in: path, required: true, schema: { type: string } }]
      responses:
        "200":
          description: Track
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Track" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/genres:
    get:
      operationId: listGenres
      tags: [library]
      summary: Genre index
      responses:
        "200":
          description: Genres
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Genre" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/genres/{genre}/tracks:
    get:
      operationId: listGenreTracks
      tags: [library]
      summary: Tracks for a genre (server-composed)
      parameters: [{ name: genre, in: path, required: true, schema: { type: string } }]
      responses:
        "200":
          description: Tracks
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Track" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/playlists:
    get:
      operationId: listPlaylists
      tags: [library]
      summary: List playlists — the calling profile's own plus read-only source playlists
      description: |
        Returns the calling profile's own playlists, other profiles' `shared`
        and `collaborative` playlists, and read-only source (Plex) playlists
        (`origin: source`, visible to every profile). Mutations return 403
        unless the caller is the owner — except appending/removing tracks on a
        `collaborative` playlist, which any profile may do.
      responses:
        "200":
          description: Playlists
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Playlist" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      operationId: createPlaylist
      tags: [library]
      summary: Create a playlist (Blittarr-native, owned by the calling profile)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title: { type: string }
                visibility: { type: string, enum: [private, shared, collaborative], default: private }
                trackIds:
                  type: array
                  items: { type: string }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Playlist" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/playlists/{playlistId}:
    get:
      operationId: getPlaylist
      tags: [library]
      summary: Playlist detail
      parameters: [{ name: playlistId, in: path, required: true, schema: { type: string } }]
      responses:
        "200":
          description: Playlist
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Playlist" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      operationId: updatePlaylist
      tags: [library]
      summary: Update playlist (rename, visibility — owner only)
      parameters: [{ name: playlistId, in: path, required: true, schema: { type: string } }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
                visibility: { type: string, enum: [private, shared, collaborative] }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Playlist" }
        "403": { $ref: "#/components/responses/Problem" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      operationId: deletePlaylist
      tags: [library]
      summary: Delete playlist
      parameters: [{ name: playlistId, in: path, required: true, schema: { type: string } }]
      responses:
        "204": { description: Deleted }
        "403": { $ref: "#/components/responses/Problem" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/playlists/{playlistId}/tracks:
    get:
      operationId: listPlaylistTracks
      tags: [library]
      summary: Playlist tracks (paged for very long playlists)
      parameters:
        - { name: playlistId, in: path, required: true, schema: { type: string } }
        - $ref: "#/components/parameters/cursor"
        - $ref: "#/components/parameters/limit"
      responses:
        "200":
          description: Tracks
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/PlaylistTrack" }
        "404": { $ref: "#/components/responses/NotFound" }
    post:
      operationId: appendPlaylistTracks
      tags: [library]
      summary: Append tracks
      parameters: [{ name: playlistId, in: path, required: true, schema: { type: string } }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [trackIds]
              properties:
                trackIds:
                  type: array
                  items: { type: string }
      responses:
        "204": { description: Appended }
        "403": { $ref: "#/components/responses/Problem" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/playlists/{playlistId}/tracks/{itemId}:
    delete:
      operationId: removePlaylistTrack
      tags: [library]
      summary: Remove one playlist item (by playlist item id, not track id)
      parameters:
        - { name: playlistId, in: path, required: true, schema: { type: string } }
        - { name: itemId, in: path, required: true, schema: { type: string } }
      responses:
        "204": { description: Removed }
        "403": { $ref: "#/components/responses/Problem" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/ratings:
    put:
      operationId: setRating
      tags: [library]
      summary: Rate an item (track or artist) — Blittarr-native, per profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [itemType, itemId]
              properties:
                itemType: { type: string, enum: [track, artist] }
                itemId: { type: string }
                rating10:
                  type: integer
                  minimum: 0
                  maximum: 10
                  nullable: true
                  description: Source scale 0–10 (stars×2); null clears
      responses:
        "204": { description: Rated }
        "404": { $ref: "#/components/responses/NotFound" }

  # ───────────────────────────── search ─────────────────────────────
  /v1/search:
    get:
      operationId: search
      tags: [search]
      summary: Federated search — library results plus external (not-in-library) artists
      parameters:
        - { name: q, in: query, required: true, schema: { type: string, minLength: 2 } }
        - { name: types, in: query, required: false, schema: { type: string, example: "artists,albums,tracks,external" }, description: Comma-separated filter; default all }
      responses:
        "200":
          description: Grouped results
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SearchResults" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  # ───────────────────────────── discovery ─────────────────────────────
  /v1/home:
    get:
      operationId: getHome
      tags: [discovery]
      summary: Server-composed home rails (personalized to the calling profile)
      responses:
        "200":
          description: Rails
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HomeRails" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/mixes:
    get:
      operationId: listMixes
      tags: [discovery]
      summary: Available mixes (smart playlists, for-you, mood mixes)
      responses:
        "200":
          description: Mixes
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Mix" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/mixes/{mixId}/tracks:
    get:
      operationId: listMixTracks
      tags: [discovery]
      summary: Materialize a mix
      parameters: [{ name: mixId, in: path, required: true, schema: { type: string } }]
      responses:
        "200":
          description: Tracks
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Track" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/radio/next:
    post:
      operationId: getRadioNext
      tags: [discovery]
      summary: Next batch of radio tracks for the given seeds
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                seedTrackIds:
                  type: array
                  items: { type: string }
                seedArtistIds:
                  type: array
                  items: { type: string }
                excludeTrackIds:
                  type: array
                  items: { type: string }
                  description: Recently played/queued — server also applies its own exclusions
                count: { type: integer, default: 10, maximum: 50 }
      responses:
        "200":
          description: Playable owned tracks
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Track" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/external/artists/{name}:
    get:
      operationId: getExternalArtist
      tags: [discovery]
      summary: External artist page (bio, owned∪external discography, similar)
      parameters: [{ name: name, in: path, required: true, schema: { type: string } }]
      responses:
        "200":
          description: External artist
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ExternalArtist" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ───────────────────────────── playback ─────────────────────────────
  /v1/playback/events:
    post:
      operationId: reportPlaybackEvents
      tags: [playback]
      summary: Report playback events (batched; feeds the calling profile's taste, scrobbles, recently-played)
      description: |
        Apps queue events offline and flush in order. Idempotency: events carry a
        client-generated `eventId`; duplicates are ignored. Attribution is
        keyed to the token — events queued under one profile stay that
        profile's even if the device has since switched.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [events]
              properties:
                events:
                  type: array
                  maxItems: 500
                  items: { $ref: "#/components/schemas/PlaybackEvent" }
      responses:
        "202": { description: Accepted }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/taste/snapshot:
    get:
      operationId: getTasteSnapshot
      tags: [playback]
      summary: The calling profile's taste snapshot (per-item stats for UI badges/panels)
      responses:
        "200":
          description: Snapshot
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TasteSnapshot" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  # ───────────────────────────── streaming ─────────────────────────────
  /v1/stream/{trackId}:
    get:
      operationId: streamTrack
      tags: [streaming]
      summary: Stream the original file (direct play, Range supported)
      parameters:
        - { name: trackId, in: path, required: true, schema: { type: string } }
        - { name: Range, in: header, required: false, schema: { type: string } }
      responses:
        "200": { description: Full content, content: { audio/*: { schema: { type: string, format: binary } } } }
        "206": { description: Partial content }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/stream-grants:
    post:
      operationId: createStreamGrant
      tags: [streaming]
      summary: Mint a short-lived signed URL for players that cannot send headers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [trackId]
              properties:
                trackId: { type: string }
      responses:
        "201":
          description: Grant
          content:
            application/json:
              schema:
                type: object
                required: [url, expiresAt]
                properties:
                  url: { type: string, description: "Absolute URL, valid for the grant lifetime only" }
                  expiresAt: { type: string, format: date-time }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/art/{artId}:
    get:
      operationId: getArt
      tags: [streaming]
      summary: Artwork with server-side resize + cache
      parameters:
        - { name: artId, in: path, required: true, schema: { type: string } }
        - { name: w, in: query, required: false, schema: { type: integer, maximum: 2048 } }
        - { name: h, in: query, required: false, schema: { type: integer, maximum: 2048 } }
      responses:
        "200": { description: Image, content: { image/jpeg: { schema: { type: string, format: binary } } } }
        "404": { $ref: "#/components/responses/NotFound" }

  # ───────────────────────────── artifacts ─────────────────────────────
  /v1/artifacts:
    post:
      operationId: requestArtifacts
      tags: [artifacts]
      summary: Request download artifacts (server transcodes + caches; batch-friendly)
      description: |
        Idempotent per (trackId, format, bitrateKbps): re-requesting returns the
        existing artifact. `format: original` artifacts are immediately `ready`.
        Progress and readiness arrive via WS `artifact.updated`.

        Each artifact carries `albumId` + `artId` so sync flows can prefetch
        album art (one fetch per distinct albumId) and downloaded content
        renders with art offline.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [trackIds, format]
              properties:
                trackIds:
                  type: array
                  minItems: 1
                  maxItems: 500
                  items: { type: string }
                format: { type: string, enum: [original, aac] }
                bitrateKbps: { type: integer, enum: [128, 192, 256, 320], nullable: true, description: Required for aac }
      responses:
        "202":
          description: Artifacts (existing or queued)
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Artifact" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/artifacts/{artifactId}:
    get:
      operationId: getArtifact
      tags: [artifacts]
      summary: Artifact status
      parameters: [{ name: artifactId, in: path, required: true, schema: { type: string } }]
      responses:
        "200":
          description: Artifact
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Artifact" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      operationId: releaseArtifact
      tags: [artifacts]
      summary: Hint that this device no longer needs the artifact (server may evict)
      parameters: [{ name: artifactId, in: path, required: true, schema: { type: string } }]
      responses:
        "204": { description: Released }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/artifacts/{artifactId}/file:
    get:
      operationId: downloadArtifact
      tags: [artifacts]
      summary: Download the artifact (exact Content-Length; Range supported)
      parameters:
        - { name: artifactId, in: path, required: true, schema: { type: string } }
        - { name: Range, in: header, required: false, schema: { type: string } }
      responses:
        "200": { description: Full content, content: { audio/*: { schema: { type: string, format: binary } } } }
        "206": { description: Partial content }
        "409": { description: Not ready yet, content: { application/problem+json: { schema: { $ref: "#/components/schemas/Problem" } } } }
        "404": { $ref: "#/components/responses/NotFound" }

  # ───────────────────────────── loves ─────────────────────────────
  /v1/loves:
    get:
      operationId: listLoves
      tags: [loves]
      summary: The calling profile's non-neutral love records (paged)
      parameters:
        - $ref: "#/components/parameters/cursor"
        - $ref: "#/components/parameters/limit"
        - { name: kind, in: query, required: false, schema: { type: string, enum: [artist, album, track] } }
        - { name: state, in: query, required: false, schema: { type: string, enum: [loved, not_for_me] } }
      responses:
        "200":
          description: Love records
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/LoveRecord" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/loves/{ref}:
    put:
      operationId: setLove
      tags: [loves]
      summary: Set the tri-state love for an item (idempotent, per profile)
      description: |
        `ref` is a canonical id (`art_`/`alb_`/`trk_` — the kind derives from
        the prefix). External artists surfaced by search/similar/discover carry
        canonical ids too, so they are lovable before they are owned.

        `loved` on an artist → Lidarr ensure + monitor + back-catalog search;
        on a track → auto "Loved Tracks" playlist + `track.love` relay to the
        profile's connected last.fm. `not_for_me` = never surface in any
        generated playlist/mix/radio/discovery **for this profile only**.
        `neutral` clears either state.

        Instance-level: Blittarr watches/acquires an artist while ≥1 profile
        loves it (union); removing the last love stops watching but never
        removes media.
      parameters:
        - { name: ref, in: path, required: true, schema: { type: string, example: art_9f3kq2 } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [state]
              properties:
                state: { $ref: "#/components/schemas/LoveState" }
      responses:
        "200":
          description: Resulting love record
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LoveRecord" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/acquisition/activity:
    get:
      operationId: getAcquisitionActivity
      tags: [loves]
      summary: Acquisition activity (desktop Activity view; empty when no acquirer configured)
      responses:
        "200":
          description: Activity
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AcquisitionActivity" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  # ───────────────────────────── events ─────────────────────────────
  /v1/ws:
    get:
      operationId: subscribeEvents
      tags: [events]
      summary: WebSocket upgrade — typed event stream
      description: |
        Standard WS upgrade authenticated with a profile token. Envelope
        `{type, at, data}`; event catalog in docs/architecture.md. Instance
        events (library.changed, artifact.updated, acquisition.updated) go to
        every connection; profile-scoped events (playlist.changed,
        love.updated, taste.updated) only to that profile's connections.
        Clients MUST ignore unknown event types.
      responses:
        "101": { description: Switching protocols }
        "401": { $ref: "#/components/responses/Unauthorized" }

  # ───────────────────────────── admin ─────────────────────────────
  /admin/api/setup:
    post:
      operationId: adminSetup
      tags: [admin]
      summary: First-run — set the admin password (only while setupComplete=false)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password: { type: string, minLength: 10 }
      responses:
        "204": { description: Admin created }
        "409": { description: Setup already complete, content: { application/problem+json: { schema: { $ref: "#/components/schemas/Problem" } } } }

  /admin/api/session:
    post:
      operationId: adminLogin
      tags: [admin]
      summary: Admin login (sets session cookie)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password: { type: string }
      responses:
        "204": { description: Session cookie set }
        "401": { $ref: "#/components/responses/Unauthorized" }
    delete:
      operationId: adminLogout
      tags: [admin]
      summary: Admin logout
      security: [{ adminSession: [] }]
      responses:
        "204": { description: Logged out }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /admin/api/state:
    get:
      operationId: adminGetState
      tags: [admin]
      summary: Admin dashboard state (setup progress, integrations, source health)
      security: [{ adminSession: [] }]
      responses:
        "200":
          description: State
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminState" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /admin/api/source/plex/pin:
    post:
      operationId: adminStartPlexPin
      tags: [admin]
      summary: Start Plex account link (PIN flow)
      security: [{ adminSession: [] }]
      responses:
        "201":
          description: PIN
          content:
            application/json:
              schema:
                type: object
                required: [pinId, code, url]
                properties:
                  pinId: { type: string }
                  code: { type: string }
                  url: { type: string, description: plex.tv/link }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /admin/api/source/plex/pin/{pinId}:
    get:
      operationId: adminGetPlexPin
      tags: [admin]
      summary: Poll Plex PIN
      security: [{ adminSession: [] }]
      parameters: [{ name: pinId, in: path, required: true, schema: { type: string } }]
      responses:
        "200":
          description: PIN state
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status: { type: string, enum: [pending, linked, expired] }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /admin/api/source/plex/libraries:
    get:
      operationId: adminListPlexLibraries
      tags: [admin]
      summary: Discoverable music libraries across linked servers
      security: [{ adminSession: [] }]
      responses:
        "200":
          description: Libraries
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/SourceLibrary" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /admin/api/source/plex/library:
    put:
      operationId: adminSelectPlexLibrary
      tags: [admin]
      summary: Select the active library
      security: [{ adminSession: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [serverId, libraryId]
              properties:
                serverId: { type: string }
                libraryId: { type: string }
      responses:
        "204": { description: Selected }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /admin/api/integrations/lidarr:
    get:
      operationId: adminGetLidarr
      tags: [admin]
      summary: Lidarr config (secrets reported as set-flags only)
      security: [{ adminSession: [] }]
      responses:
        "200":
          description: Config
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LidarrConfig" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    put:
      operationId: adminSetLidarr
      tags: [admin]
      summary: Set Lidarr config
      security: [{ adminSession: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [baseUrl, apiKey]
              properties:
                baseUrl: { type: string, example: "http://192.168.1.5:8686" }
                apiKey: { type: string }
                allowSelfSigned: { type: boolean, default: false }
      responses:
        "204": { description: Saved }
        "401": { $ref: "#/components/responses/Unauthorized" }
    delete:
      operationId: adminDeleteLidarr
      tags: [admin]
      summary: Remove Lidarr integration
      security: [{ adminSession: [] }]
      responses:
        "204": { description: Removed }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /admin/api/integrations/lidarr/test:
    post:
      operationId: adminTestLidarr
      tags: [admin]
      summary: Test Lidarr connectivity
      security: [{ adminSession: [] }]
      responses:
        "200":
          description: Result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/IntegrationTestResult" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /admin/api/integrations/lastfm:
    get:
      operationId: adminGetLastfm
      tags: [admin]
      summary: last.fm config + connection state
      security: [{ adminSession: [] }]
      responses:
        "200":
          description: Config
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LastfmConfig" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    put:
      operationId: adminSetLastfm
      tags: [admin]
      summary: Set last.fm API credentials
      security: [{ adminSession: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [apiKey, sharedSecret]
              properties:
                apiKey: { type: string }
                sharedSecret: { type: string }
      responses:
        "204": { description: Saved }
        "401": { $ref: "#/components/responses/Unauthorized" }
    delete:
      operationId: adminDeleteLastfm
      tags: [admin]
      summary: Disconnect last.fm
      security: [{ adminSession: [] }]
      responses:
        "204": { description: Removed }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /admin/api/profiles:
    get:
      operationId: adminListProfiles
      tags: [admin]
      summary: List household profiles
      security: [{ adminSession: [] }]
      responses:
        "200":
          description: Profiles
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Profile" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      operationId: adminCreateProfile
      tags: [admin]
      summary: Create a profile
      security: [{ adminSession: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                pin: { type: string, nullable: true, description: Optional 4-8 digit PIN }
                avatarColor: { type: string, nullable: true }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Profile" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /admin/api/profiles/{profileId}:
    patch:
      operationId: adminUpdateProfile
      tags: [admin]
      summary: Update a profile (rename, set/clear PIN, color)
      security: [{ adminSession: [] }]
      parameters: [{ name: profileId, in: path, required: true, schema: { type: string } }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                pin: { type: string, nullable: true, description: New PIN; explicit null clears it }
                avatarColor: { type: string, nullable: true }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Profile" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      operationId: adminDeleteProfile
      tags: [admin]
      summary: Delete a profile (its playlists/taste/loves/history go with it; paired devices fall back to the profile picker)
      security: [{ adminSession: [] }]
      parameters: [{ name: profileId, in: path, required: true, schema: { type: string } }]
      responses:
        "204": { description: Deleted }
        "404": { $ref: "#/components/responses/NotFound" }

  /admin/api/pairings:
    get:
      operationId: adminListPairings
      tags: [admin]
      summary: Pending pairing requests
      security: [{ adminSession: [] }]
      responses:
        "200":
          description: Pending pairings
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/PairingRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /admin/api/pairings/{pairingId}/approve:
    post:
      operationId: adminApprovePairing
      tags: [admin]
      summary: Approve a pairing
      security: [{ adminSession: [] }]
      parameters: [{ name: pairingId, in: path, required: true, schema: { type: string } }]
      responses:
        "204": { description: Approved }
        "404": { $ref: "#/components/responses/NotFound" }

  /admin/api/pairings/{pairingId}/deny:
    post:
      operationId: adminDenyPairing
      tags: [admin]
      summary: Deny a pairing
      security: [{ adminSession: [] }]
      parameters: [{ name: pairingId, in: path, required: true, schema: { type: string } }]
      responses:
        "204": { description: Denied }
        "404": { $ref: "#/components/responses/NotFound" }

  /admin/api/pair-codes:
    post:
      operationId: adminCreatePairCode
      tags: [admin]
      summary: Mint a single-use QR pairing code
      description: |
        Backs the web admin's "Link a device" QR. `qrPayload` is the exact
        string to encode: `blitteramp://pair?server=<canonicalUrl>&code=<code>`.
        Requires the canonical URL server setting; the QR must never embed a
        raw request-derived LAN address.
      security: [{ adminSession: [] }]
      responses:
        "201":
          description: Pair code
          content:
            application/json:
              schema:
                type: object
                required: [code, expiresAt, canonicalUrl, qrPayload]
                properties:
                  code: { type: string, example: "7GK4PC" }
                  expiresAt: { type: string, format: date-time }
                  canonicalUrl: { type: string, example: "https://music.example.net" }
                  qrPayload: { type: string, example: "blitteramp://pair?server=https%3A%2F%2Fmusic.example.net&code=7GK4PC" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "409": { description: Canonical URL not configured, content: { application/problem+json: { schema: { $ref: "#/components/schemas/Problem" } } } }

  /admin/api/devices:
    get:
      operationId: adminListDevices
      tags: [admin]
      summary: Paired devices
      security: [{ adminSession: [] }]
      responses:
        "200":
          description: Devices
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Device" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /admin/api/devices/{deviceId}:
    delete:
      operationId: adminRevokeDevice
      tags: [admin]
      summary: Revoke a device (its token stops working immediately)
      security: [{ adminSession: [] }]
      parameters: [{ name: deviceId, in: path, required: true, schema: { type: string } }]
      responses:
        "204": { description: Revoked }
        "404": { $ref: "#/components/responses/NotFound" }

  /admin/api/settings/server:
    get:
      operationId: adminGetServerSettings
      tags: [admin]
      summary: Server settings (canonical URL)
      security: [{ adminSession: [] }]
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ServerSettings" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    put:
      operationId: adminSetServerSettings
      tags: [admin]
      summary: Update server settings
      security: [{ adminSession: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ServerSettings" }
      responses:
        "204": { description: Saved }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /admin/api/settings/transcode:
    get:
      operationId: adminGetTranscodeSettings
      tags: [admin]
      summary: Transcode + artifact-cache settings
      security: [{ adminSession: [] }]
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TranscodeSettings" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    put:
      operationId: adminSetTranscodeSettings
      tags: [admin]
      summary: Update transcode + artifact-cache settings
      security: [{ adminSession: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TranscodeSettings" }
      responses:
        "204": { description: Saved }
        "401": { $ref: "#/components/responses/Unauthorized" }

components:
  securitySchemes:
    deviceToken:
      type: http
      scheme: bearer
      description: Per-device token minted via PIN pairing
    adminSession:
      type: apiKey
      in: cookie
      name: blittarr_admin

  parameters:
    cursor:
      name: cursor
      in: query
      schema: { type: string }
      description: |
        Opaque page cursor from the previous response's `nextCursor`. Omit for
        the first page. Only valid for the sort/filter combination it was
        minted under.
    limit:
      name: limit
      in: query
      schema: { type: integer, minimum: 1, maximum: 1000, default: 200 }
    sort:
      name: sort
      in: query
      schema: { type: string, enum: [title, artist, recentlyAdded, year], default: title }

  responses:
    Unauthorized:
      description: Missing/invalid credentials
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
    NotFound:
      description: Not found
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
    Problem:
      description: Error
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
    SourceUnavailable:
      description: Music source unreachable (apps show offline/degraded state)
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }

  schemas:
    Problem:
      type: object
      required: [title, status]
      properties:
        title: { type: string }
        status: { type: integer }
        detail: { type: string, nullable: true }
        code: { type: string, nullable: true, description: "Machine-readable, e.g. source_unavailable, artifact_not_ready" }

    Page:
      type: object
      properties:
        nextCursor:
          type: string
          nullable: true
          description: Pass as `cursor` to fetch the next page; null/absent on the last page

    ServerStatus:
      type: object
      required: [version, setupComplete, source]
      properties:
        version: { type: string }
        setupComplete: { type: boolean }
        source:
          type: object
          required: [kind, connected]
          properties:
            kind: { type: string, enum: [plex] }
            connected: { type: boolean }
            libraryName: { type: string, nullable: true }
        integrations:
          type: object
          properties:
            lidarr: { type: string, enum: [absent, configured, error] }
            lastfm: { type: string, enum: [absent, configured, connected, error] }

    Capabilities:
      type: object
      required: [acquisition, lastfm, transcodeFormats]
      properties:
        acquisition: { type: boolean, description: Love(artist) will acquire; Activity view available }
        lastfm: { type: boolean, description: Instance credentials present — profiles can connect via /v1/me/lastfm }
        transcodeFormats:
          type: array
          items: { type: string, enum: [original, aac] }
          description: aac absent when ffmpeg unavailable
        radio: { type: boolean }

    Device:
      type: object
      required: [deviceId, name, type, pairedAt]
      properties:
        deviceId: { type: string, example: dev_8f2k1q }
        name: { type: string }
        type: { type: string, enum: [ios, desktop, web, other] }
        pairedAt: { type: string, format: date-time }
        lastSeenAt: { type: string, format: date-time, nullable: true }

    Profile:
      type: object
      required: [profileId, name, hasPin]
      properties:
        profileId: { type: string, example: prf_1a2b3c }
        name: { type: string }
        hasPin: { type: boolean }
        avatarColor: { type: string, nullable: true, description: Hex color for the profile chip }

    Me:
      type: object
      required: [device]
      properties:
        device: { $ref: "#/components/schemas/Device" }
        profile:
          allOf: [{ $ref: "#/components/schemas/Profile" }]
          description: Absent when called with a device token

    PairingRequest:
      type: object
      required: [pairingId, code, deviceName, deviceType, requestedAt, expiresAt]
      properties:
        pairingId: { type: string, example: pair_5t6y7u }
        code: { type: string }
        deviceName: { type: string }
        deviceType: { type: string }
        requestedAt: { type: string, format: date-time }
        expiresAt: { type: string, format: date-time }

    Library:
      type: object
      required: [libraryId, title, updatedAt, counts]
      properties:
        libraryId: { type: string, example: lib_0m1n2b }
        title: { type: string }
        updatedAt:
          type: integer
          format: int64
          description: Freshness anchor (max of source updatedAt/scannedAt); changes when the source rescans
        counts:
          type: object
          properties:
            artists: { type: integer }
            albums: { type: integer }
            tracks: { type: integer }

    Artist:
      type: object
      required: [artistId, name]
      properties:
        artistId: { type: string, example: art_9f3kq2 }
        name: { type: string }
        artId: { type: string, nullable: true, example: img_4c5d6e }
        genres:
          type: array
          items: { type: string }
        albumCount: { type: integer, nullable: true }
        userRating10: { type: integer, nullable: true }
        loveState: { $ref: "#/components/schemas/LoveState", description: "The calling profile's tri-state; absent = neutral" }

    ArtistDetail:
      allOf:
        - $ref: "#/components/schemas/Artist"
        - type: object
          properties:
            bio: { type: string, nullable: true, description: "HTML-stripped, from last.fm when available" }
            trackCount: { type: integer, nullable: true }
            loveState: { $ref: "#/components/schemas/LoveState" }
            stats:
              type: object
              nullable: true
              properties:
                plays: { type: integer }
                lastPlayedAt: { type: string, format: date-time, nullable: true }

    Album:
      type: object
      required: [albumId, title, artistId, artistName]
      properties:
        albumId: { type: string, example: alb_7xm1pd }
        title: { type: string }
        artistId: { type: string, example: art_9f3kq2 }
        artistName: { type: string }
        year: { type: integer, nullable: true }
        artId: { type: string, nullable: true, example: img_4c5d6e }
        genres:
          type: array
          items: { type: string }
        moods:
          type: array
          items: { type: string }
        trackCount: { type: integer, nullable: true }
        updatedAt: { type: integer, format: int64, nullable: true, description: For client cache validators }
        loveState: { $ref: "#/components/schemas/LoveState" }

    Track:
      type: object
      required: [trackId, title, artistId, artistName, albumId, albumTitle, durationMs, media]
      properties:
        trackId: { type: string, example: trk_2vq8na }
        title: { type: string }
        index: { type: integer, nullable: true }
        discNumber: { type: integer, nullable: true }
        artistId: { type: string, example: art_9f3kq2 }
        artistName: { type: string }
        albumId: { type: string, example: alb_7xm1pd }
        albumTitle: { type: string }
        durationMs: { type: integer }
        artId: { type: string, nullable: true, example: img_4c5d6e }
        userRating10: { type: integer, nullable: true, description: The calling profile's rating }
        genres:
          type: array
          items: { type: string }
        media: { $ref: "#/components/schemas/MediaInfo" }
        loveState: { $ref: "#/components/schemas/LoveState" }

    MediaInfo:
      type: object
      required: [container, audioCodec]
      properties:
        container: { type: string, example: flac }
        audioCodec: { type: string, example: flac }
        bitrateKbps: { type: integer, nullable: true }
        sizeBytes: { type: integer, format: int64, nullable: true }

    Genre:
      type: object
      required: [name, albumCount]
      properties:
        name: { type: string }
        albumCount: { type: integer }
        artId: { type: string, nullable: true, example: img_4c5d6e, description: Representative art for collage }

    Playlist:
      type: object
      required: [playlistId, title, trackCount, origin, visibility]
      properties:
        playlistId: { type: string, example: pl_4hh2sm }
        title: { type: string }
        trackCount: { type: integer }
        durationMs: { type: integer, nullable: true }
        artId: { type: string, nullable: true, example: img_4c5d6e }
        origin:
          type: string
          enum: [blittarr, source]
          description: blittarr = the calling profile's own (mutable); source = surfaced from Plex, read-only, visible to all profiles
        smart: { type: boolean, default: false, description: Source-defined smart playlist }
        updatedAt: { type: integer, format: int64, nullable: true }
        visibility:
          type: string
          enum: [private, shared, collaborative]
          default: private
          description: "shared = household can see/play; collaborative = household can also add/remove tracks. Owner manages metadata/deletion. Always private-equivalent read-only for origin: source."
        ownerProfileId: { type: string, nullable: true, example: prf_1a2b3c, description: "Owning profile; null for origin: source" }
        ownerName: { type: string, nullable: true, description: Display name for "Shared by" chrome }

    PlaylistTrack:
      allOf:
        - $ref: "#/components/schemas/Track"
        - type: object
          required: [itemId]
          properties:
            itemId: { type: string, example: pli_9k8j7h, description: Playlist item id (removal handle) }

    SimilarArtist:
      type: object
      required: [name, owned, artistId]
      properties:
        name: { type: string }
        owned: { type: boolean }
        artistId: { type: string, description: Canonical id (always set; external artists get ids minted on first surface) }
        artId: { type: string, nullable: true, example: img_4c5d6e }
        match: { type: number, nullable: true, minimum: 0, maximum: 1 }
        loveState: { $ref: "#/components/schemas/LoveState" }

    SearchResults:
      type: object
      required: [artists, albums, tracks, external]
      properties:
        artists:
          type: array
          items: { $ref: "#/components/schemas/Artist" }
        albums:
          type: array
          items: { $ref: "#/components/schemas/Album" }
        tracks:
          type: array
          items: { $ref: "#/components/schemas/Track" }
        external:
          type: array
          description: Not-in-library artists (empty when no acquisition/discovery integration)
          items: { $ref: "#/components/schemas/SimilarArtist" }

    HomeRails:
      type: object
      required: [rails]
      properties:
        rails:
          type: array
          items:
            type: object
            required: [kind, title]
            properties:
              kind: { type: string, enum: [mixes, playlists, recentlyPlayed, recentlyAdded, newDiscoveries] }
              title: { type: string }
              mixes:
                type: array
                nullable: true
                items: { $ref: "#/components/schemas/Mix" }
              playlists:
                type: array
                nullable: true
                items: { $ref: "#/components/schemas/Playlist" }
              tracks:
                type: array
                nullable: true
                items: { $ref: "#/components/schemas/Track" }
              albums:
                type: array
                nullable: true
                items: { $ref: "#/components/schemas/Album" }

    Mix:
      type: object
      required: [mixId, kind, title]
      properties:
        mixId: { type: string, example: "mood:driving" }
        kind: { type: string, enum: [forYou, topRated, heavyRotation, rediscover, mood, genre] }
        title: { type: string }
        collageArtIds:
          type: array
          maxItems: 4
          items: { type: string }
        trackCount: { type: integer, nullable: true }

    ExternalArtist:
      type: object
      required: [name, owned, artistId]
      properties:
        name: { type: string }
        owned: { type: boolean }
        artistId: { type: string, description: Canonical id (always set; external artists get ids minted on first surface) }
        bio: { type: string, nullable: true }
        artId: { type: string, nullable: true, example: img_4c5d6e }
        loveState: { $ref: "#/components/schemas/LoveState" }
        similar:
          type: array
          items: { $ref: "#/components/schemas/SimilarArtist" }
        discography:
          type: array
          items:
            type: object
            required: [title, state]
            properties:
              title: { type: string }
              year: { type: integer, nullable: true }
              state: { type: string, enum: [owned, available, acquiring, unavailable] }
              albumId: { type: string, nullable: true, description: Set when owned }

    PlaybackEvent:
      type: object
      required: [eventId, type, trackId, at]
      properties:
        eventId: { type: string, description: Client-generated UUID (dedupe key) }
        type: { type: string, enum: [started, progress, paused, resumed, ended, skipped] }
        trackId: { type: string }
        positionSec: { type: number, nullable: true }
        at: { type: string, format: date-time }

    TasteSnapshot:
      type: object
      required: [artists, tracks]
      properties:
        computedAt: { type: string, format: date-time }
        artists:
          type: array
          items:
            type: object
            required: [name, affinity]
            properties:
              name: { type: string }
              affinity: { type: number }
        tracks:
          type: array
          items:
            type: object
            required: [key, plays]
            properties:
              key: { type: string, description: "lower(artist)␟lower(title)" }
              plays: { type: integer }
              skips: { type: integer }
              lastPlayedAt: { type: string, format: date-time, nullable: true }

    Artifact:
      type: object
      required: [artifactId, trackId, format, status]
      properties:
        artifactId: { type: string, example: arf_3e4r5t }
        trackId: { type: string, example: trk_2vq8na }
        albumId: { type: string, nullable: true, example: alb_7xm1pd, description: "Grouping key for offline art (one art fetch per album, not per track)" }
        artId: { type: string, nullable: true, example: img_4c5d6e, description: "Album art for the track — sync flows prefetch /v1/art/{artId} alongside the file so downloaded content has art offline" }
        format: { type: string, enum: [original, aac] }
        bitrateKbps: { type: integer, nullable: true }
        status: { type: string, enum: [queued, processing, ready, failed] }
        bytes: { type: integer, format: int64, nullable: true, description: Exact size once ready }
        error: { type: string, nullable: true }

    LoveState:
      type: string
      enum: [loved, neutral, not_for_me]
      description: Per-profile tri-state; neutral records are not persisted/listed

    LoveRecord:
      type: object
      required: [loveId, ref, kind, state, name, updatedAt]
      properties:
        loveId: { type: string, example: lov_6r5e4w }
        ref: { type: string, example: art_9f3kq2, description: Canonical id of the loved item }
        kind: { type: string, enum: [artist, album, track] }
        state: { $ref: "#/components/schemas/LoveState" }
        name: { type: string }
        artistName: { type: string, nullable: true, description: For album/track loves }
        owned: { type: boolean, description: Item is in the library (false = external artist being acquired) }
        updatedAt: { type: string, format: date-time }
        acquisition:
          type: object
          nullable: true
          description: Artist loves only; absent when no acquirer configured
          required: [state]
          properties:
            state: { type: string, enum: [watching, acquiring, error] }
            error: { type: string, nullable: true }

    AcquisitionActivity:
      type: object
      required: [queue, wanted]
      properties:
        queue:
          type: array
          items:
            type: object
            required: [title, artistName, progress]
            properties:
              title: { type: string }
              artistName: { type: string }
              progress: { type: number, minimum: 0, maximum: 1 }
        wanted:
          type: array
          items:
            type: object
            required: [title, artistName]
            properties:
              title: { type: string }
              artistName: { type: string }

    SourceLibrary:
      type: object
      required: [serverId, serverName, libraryId, title, owned]
      properties:
        serverId: { type: string }
        serverName: { type: string }
        libraryId: { type: string }
        title: { type: string }
        owned: { type: boolean }
        sourceTitle: { type: string, nullable: true, description: Owner name for shared servers }

    AdminState:
      type: object
      required: [setupComplete, source, integrations, pendingPairings, deviceCount, profileCount]
      properties:
        setupComplete: { type: boolean }
        source:
          type: object
          properties:
            linked: { type: boolean }
            librarySelected: { type: boolean }
            connected: { type: boolean }
            libraryName: { type: string, nullable: true }
        integrations:
          type: object
          properties:
            lidarr: { type: string, enum: [absent, configured, error] }
            lastfm: { type: string, enum: [absent, configured, connected, error] }
        pendingPairings: { type: integer }
        deviceCount: { type: integer }
        profileCount: { type: integer }
        canonicalUrlSet: { type: boolean }

    LidarrConfig:
      type: object
      required: [configured]
      properties:
        configured: { type: boolean }
        baseUrl: { type: string, nullable: true }
        apiKeySet: { type: boolean }
        allowSelfSigned: { type: boolean }

    LastfmConfig:
      type: object
      required: [configured]
      properties:
        configured: { type: boolean, description: Instance API credentials present }
        connectedProfiles: { type: integer, description: "How many profiles have connected their last.fm account (connections are per profile, via /v1/me/lastfm)" }

    IntegrationTestResult:
      type: object
      required: [ok]
      properties:
        ok: { type: boolean }
        version: { type: string, nullable: true }
        error: { type: string, nullable: true }

    ServerSettings:
      type: object
      required: [canonicalUrl]
      properties:
        canonicalUrl:
          type: string
          nullable: true
          format: uri
          example: "https://music.example.net"
          description: Public base URL embedded in pairing QRs — set during first-run setup; never a raw LAN IP unless devices genuinely reach it there

    TranscodeSettings:
      type: object
      required: [defaultFormat, defaultBitrateKbps, artifactCacheMaxBytes]
      properties:
        defaultFormat: { type: string, enum: [original, aac] }
        defaultBitrateKbps: { type: integer, enum: [128, 192, 256, 320] }
        artifactCacheMaxBytes: { type: integer, format: int64 }
        ffmpegAvailable: { type: boolean, readOnly: true }
